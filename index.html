<!DOCTYPE html>
<html>
<head>
<title>KEVIN WIFI ENTERTAINMENT</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* TOP NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #000;
  position: sticky;
  top: 0;
}

.logo {
  color: red;
  font-size: 24px;
  font-weight: bold;
}

.menu a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.menu a:hover {
  color: red;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover no-repeat;
  display: flex;
  align-items: center;
  padding: 40px;
}

.hero-text {
  max-width: 500px;
}

.hero h1 {
  font-size: 40px;
}

.btn {
  padding: 10px 20px;
  margin-top: 10px;
  border: none;
  cursor: pointer;
  background: red;
  color: white;
  font-size: 16px;
}

/* MOVIE ROWS */
.row {
  padding: 20px;
}

.row h2 {
  margin-bottom: 10px;
}

.movies {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.movie {
  min-width: 200px;
  height: 120px;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.movie img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.movie:hover {
  transform: scale(1.08);
}

.movie span {
  position: absolute;
  bottom: 5px;
  left: 5px;
  background: rgba(0,0,0,0.6);
  padding: 3px 6px;
  font-size: 12px;
  border-radius: 3px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">KEVIN WIFI</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Movies</a>
    <a href="#">Series</a>
    <a href="#">My List</a>
  </div>
</div>

<div class="hero">
  <div class="hero-text">
    <h1>Featured Movie</h1>
    <p>Watch the latest entertainment on KEVIN WIFI ENTERTAINMENT</p>
    <button class="btn" onclick="alert('Playing Movie...')">Play</button>
  </div>
</div>

<div class="row">
  <h2>Trending Now</h2>
  <div class="movies">
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1522120692535-9c7d1f7d2f1a" />
      <span>Movie 1</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba" />
      <span>Movie 2</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4" />
      <span>Movie 3</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae" />
      <span>Movie 4</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1505685296765-3a2736de412f" />
      <span>Movie 5</span>
    </div>
  </div>
</div>

<div class="row">
  <h2>New Releases</h2>
  <div class="movies">
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963b" />
      <span>Film A</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4" />
      <span>Film B</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba" />
      <span>Film C</span>
    </div>
    <div class="movie">
      <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae" />
      <span>Film D</span>
    </div>
  </div>
</div>

</body>
</html>
